<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1 class="text-center">Buttons</h1>

    <div class="container">
        <div class="row">
            <div class="col">
                <button class="btn btn-primary">Primary</button>
                <button class="btn btn-secondary">secondary</button>
                <button class="btn btn-info">info</button>
                <button class="btn btn-dark">dark</button>
                <button class="btn btn-danger">danger</button>
                <button class="btn btn-warning">warning</button>
                <button class="btn btn-success">success</button>
                <button class="btn btn-light">light</button>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col">
                <button class="btn btn-outline-primary">Primary</button>
                <button class="btn btn-outline-secondary">secondary</button>
                <button class="btn btn-outline-info">info</button>
                <button class="btn btn-outline-success">success</button>
                <button class="btn btn-outline-dark">dark</button>
                <button class="btn btn-outline-danger">danger</button>
                <button class="btn btn-outline-warning">warning</button>
                <button class="btn btn-outline-light">light</button>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col">
            <button class="btn btn-primary btn-lg">primary</button>
            <button class="btn btn-secondary">secondary</button>
            <button class="btn btn-info btn-sm">info</button>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col">
            <div class="btn-group">
            <button class="btn btn-primary">primary</button>
            <button class="btn btn-secondary">secondary</button>
            <button class="btn btn-info">info</button>
        </div>
    </div>
    </div>

    <div class="row mt-3">
        <div class="col">
            <div class="btn-group">
            <button class="btn btn-outline-danger">danger</button>
            <button class="btn btn-outline-warning">warning</button>
            <button class="btn btn-outline-dark">dark</button>
        </div>
    </div>
    </div>

    <div class="row mt-3">
        <div class="col">
            <a href="" class="btn btn-primary">this is link</a>
            <a href="" class="btn btn-secondary">this is link</a>
            <a href="" class="btn btn-success">this is link</a>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col">
            <div class="d-grid gap-2">
                <div class="btn btn-info">button</div>
                <div class="btn btn-warning">button</div>
            </div>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col">
            <div class="btn-group-vertical">
                <div class="btn btn-info">button</div>
                <div class="btn btn-success">button</div>
                <div class="btn btn-dark disabled">button</div>
    </div>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col">
            <div class="btn-group">
                <div class="btn btn-warning">button</div>
                <div class="btn btn-danger">button</div>
                <div class="btn btn-info disabled">button</div>
            </div>
        </div>
    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script</body>
</html>
