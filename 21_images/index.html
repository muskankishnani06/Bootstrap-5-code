<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Images</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1 class="text-center">Images</h1>

    <div class="container">
        <div class="row row-cols-3">
            <div class="col-md-4">
                <img class="img-fluid" src="https://images.pexels.com/photos/268533/pexels-photo-268533.jpeg" alt="nature">
            </div>
            <div class="col-md-4">
                <img class="img-thumbnail" src="https://images.pexels.com/photos/460621/pexels-photo-460621.jpeg" alt="nature">
            </div>
            <div class="col-md-4">
                <img class="img-fluid rounded-5" src="https://images.pexels.com/photos/414102/pexels-photo-414102.jpeg" alt="nature">
            </div>
        </div>

        <div class="row row-cols-3">
            <div class="col-md-4">
                <img class="img-fluid rounded-pill" src="https://images.pexels.com/photos/2757549/pexels-photo-2757549.jpeg" alt="nature">
            </div>
            <div class="col-md-4">
                <img class="img-fluid rounded-top-5" src="https://images.pexels.com/photos/36717/amazing-animal-beautiful-beautifull.jpg" alt="nature">
            </div>
            <div class="col-md-4">
                <img class="img-fluid rounded-bottom-5" src="https://images.pexels.com/photos/2757549/pexels-photo-2757549.jpeg" alt="nature">
            </div>
        </div>

        <div class="row row-cols-3">
            <div class="col-md-4">
                <img  class="img-fluid rounded-circle" src="https://images.pexels.com/photos/992734/pexels-photo-992734.jpeg" alt="">
            </div>
            <div class="col-md-4 mx-auto d-block">
                <img  class="img-fluid " src="https://images.pexels.com/photos/158063/bellingrath-gardens-alabama-landscape-scenic-158063.jpeg" alt="">
            </div>
            <div class="col-md-4 float-end">
                <img class="img-fluid" src="https://images.pexels.com/photos/807598/pexels-photo-807598.jpeg" alt="">
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
