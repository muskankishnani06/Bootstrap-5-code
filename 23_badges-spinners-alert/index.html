<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Badges-spinner-alert</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
        <div class="row">
            <div class="col">
                <h1>container <span class="badge text-bg-primary">wrapper</span></h1>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col">
                <span class="badge text-bg-primary">primary</span>
                <span class="badge text-bg-secondary">secondary</span>
                <span class="badge text-bg-info">info</span>
                <span class="badge text-bg-warning">warning</span>
                <span class="badge text-bg-danger">danger</span>
                <span class="badge text-bg-success">success</span>
                <span class="badge text-bg-dark">dark</span>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col">
                <h1>heading-1 <span class="badge text-bg-secondary">secondary</span></h1>
                <h2>heading-2 <span class="badge text-bg-primary">primary</span></h2>
                <h3>heading-3 <span class="badge text-bg-info">info</span></h3>
                <h4>heading-4 <span class="badge text-bg-warning">warning</span></h4>
                <h5>heading-5 <span class="badge text-bg-danger">danger</span></h5>
                <h6> heading-6 <span class="badge text-bg-success">success</span></h6>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col">
                <span class="badge rounded-pill text-bg-primary">Primary</span>
                <span class="badge rounded-pill text-bg-secondary">Secondary</span>
                <span class="badge rounded-pill text-bg-success">Success</span>
                <span class="badge rounded-pill text-bg-danger">Danger</span>
                <span class="badge rounded-pill text-bg-warning">Warning</span>
                <span class="badge rounded-pill text-bg-info">Info</span>
                <span class="badge rounded-pill text-bg-light">Light</span>
                <span class="badge rounded-pill text-bg-dark">Dark</span>
            </div>
            
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
