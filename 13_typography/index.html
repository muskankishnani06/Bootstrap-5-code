<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Typography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1 class="text-center">Typography</h1>
    <div class="container">

        <!---font-size-->
        <div class="row">
            <div class="col">
                <div class="fs-1">Font-size</div>
                <div class="fs-2">Font-size</div>
                <div class="fs-3">Font-size</div>
                <div class="fs-4">Font-size</div>
                <div class="fs-5">Font-size</div>
                <div class="fs-6">Font-size</div>
            </div>
        </div>

        <!-- display--->
         <div class="col">

        <div class="display-1">Display</div>
         <div class="display-2">Display</div>
          <div class="display-3">Display</div>
           <div class="display-4">Display</div>
            <div class="display-5">Display</div>
             <div class="display-6">Display</div>
         </div>

             <!---heading-->
             <div class="col">

             <div class="h1">heading-1</div>
              <div class="h2">heading-1</div>
               <div class="h3">heading-1</div>
                <div class="h4">heading-1</div>
                 <div class="h5">heading-1</div>
                  <div class="h6">heading-1</div>
             </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
