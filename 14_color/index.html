<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Colors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    
    <h1 class="text-center">Colors</h1>

    <div class="container">
        <div class="row">
            <div class="col">
                <div class="bg-primary text-white">Primary</div>
                <div class="bg-primary-subtle">primary-subtle</div>
                <div class="bg-secondary">secondary</div>
                <div class="bg-secondary-subtle">secondary-subtle</div>
                <div class="bg-danger">danger</div>
                <div class="bg-danger-subtle">danger-subtle</div>
                <div class="bg-warning">warning</div>
                <div class="bg-warning-subtle">warning-subtle</div>
                <div class="bg-dark">bg-dark</div>
                <div class="dark-subtle">dark-subtle</div>
                <div class="bg-success">bg-success</div>
                <div class="bg-success-subtle">bg-success-subtle</div>
                <div class="bg-info">info</div>
                <div class="bg-info-subtle">info-subtle</div>
                <div class="bg-light">light</div>
                <div class="bg-light-subtle">light-subtle</div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
